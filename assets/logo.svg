<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4"/>
      <stop offset="100%" style="stop-color:#5C2D91"/>
    </linearGradient>
    <linearGradient id="meshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#5C2D91;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4"/>
      <stop offset="100%" style="stop-color:#106EBE"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C2D91"/>
      <stop offset="100%" style="stop-color:#8661C5"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#5C2D91;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="400" height="120" rx="16" ry="16" fill="#0D1117"/>

  <!-- Hexagon background mesh -->
  <g transform="translate(15, 20)" stroke="url(#meshGrad)" stroke-width="1.5" fill="none">
    <polygon points="25,0 50,14 50,43 25,57 0,43 0,14" />
    <polygon points="50,14 75,0 75,29 50,43" />
    <polygon points="0,43 25,57 25,86 0,72" />
    <polygon points="25,57 50,43 75,29 75,57 50,72 25,86" />
    <polygon points="50,72 75,57 100,43 100,72 75,86 50,100" />
    <polygon points="75,29 100,43 100,72 75,57" />
    <polygon points="0,14 25,0 25,29 0,43" />
  </g>

  <!-- Mesh nodes -->
  <circle cx="65" cy="34" r="4" fill="url(#nodeGrad1)"/>
  <circle cx="40" cy="20" r="3" fill="url(#nodeGrad2)"/>
  <circle cx="90" cy="20" r="3" fill="url(#nodeGrad1)"/>
  <circle cx="40" cy="48" r="3" fill="url(#nodeGrad2)"/>
  <circle cx="90" cy="48" r="3" fill="url(#nodeGrad1)"/>
  <circle cx="15" cy="34" r="2.5" fill="url(#nodeGrad3)"/>
  <circle cx="115" cy="34" r="2.5" fill="url(#nodeGrad3)"/>
  <circle cx="65" cy="62" r="2.5" fill="url(#nodeGrad3)"/>
  <circle cx="40" cy="76" r="2" fill="url(#nodeGrad2)"/>
  <circle cx="90" cy="76" r="2" fill="url(#nodeGrad1)"/>
  <circle cx="65" cy="90" r="2" fill="url(#nodeGrad3)"/>

  <!-- Bolt icon -->
  <g transform="translate(35, 38)">
    <path d="M14 2 L4 28 L12 28 L8 42 L22 16 L14 16 L18 2 Z"
          fill="url(#boltGrad)"/>
  </g>

  <!-- Text -->
  <text x="138" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#E6EDF3" letter-spacing="-0.5">Power</text>
  <text x="229" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="300" fill="#0078D4" letter-spacing="-0.5">Mesh</text>

  <text x="138" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#8B949E" font-weight="400" letter-spacing="1.5">UNIFIED POWER PLATFORM TOOLCHAIN</text>

  <!-- Status dot -->
  <circle cx="397" cy="12" r="4" fill="#3FB950"/>
</svg>
